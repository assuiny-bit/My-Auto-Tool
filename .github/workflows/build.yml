name: Build-Final-V7
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 必須包含 opencv-python 確保圖片辨識與容量正常
          pip install pyinstaller pyautogui pillow opencv-python

      - name: Build executable
        # 確保圖片被正確封裝進 EXE
        run: pyinstaller --onefile --noconsole --clean --add-data "01.png;." --add-data "ca2.png;." app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Full-Auto-Tool-V7
          path: dist/app.exe
