name: Build EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui opencv-python pillow

    - name: Build EXE with PyInstaller
      # 注意：這裡使用了兩次 --add-data 分別加入 01.png 和 ca2.png
      run: pyinstaller --onefile --windowed --add-data "01.png;." --add-data "ca2.png;." --clean --noconfirm --name MyAutoTool app.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyAutoTool-Windows-EXE
        path: dist/MyAutoTool.exe
        retention-days: 30
