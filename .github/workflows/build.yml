name: Build-Final-V5
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 關鍵：必須包含 opencv-python，否則 confidence 參數無效且容量會變小
          pip install pyinstaller pyautogui pillow opencv-python

      - name: Build executable
        # 確認將 01.png 和 ca2.png 正確打包進去
        run: pyinstaller --onefile --noconsole --clean --add-data "01.png;." --add-data "ca2.png;." app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Full-Auto-Tool-V5
          path: dist/app.exe
