name: Build EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui opencv-python pillow

    - name: Build EXE with PyInstaller
      # 確保這裡列出的所有圖片都在您的 GitHub 專案根目錄下
      run: |
        pyinstaller --onefile --windowed \
        --add-data "01.png;." \
        --add-data "02.png;." \
        --add-data "ca2.png;." \
        --add-data "buynpc.png;." \
        --add-data "buybuy.png;." \
        --add-data "dd.png;." \
        --add-data "ee.png;." \
        --add-data "ff.png;." \
        --add-data "change.png;." \
        --add-data "hh.png;." \
        --add-data "over.png;." \
        --clean --noconfirm --name MyAutoTool app.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyAutoTool-Windows-EXE
        path: dist/MyAutoTool.exe
        retention-days: 30
