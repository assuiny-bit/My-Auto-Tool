name: Build EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build:
    runs-on: windows-latest # 使用 Windows 伺服器進行打包

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 使用 Python 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: pyinstaller --onefile --windowed --clean --noconfirm --name MyAutoTool app.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyAutoTool-Windows-EXE
        path: dist/MyAutoTool.exe
        retention-days: 30 # 保留 30 天
