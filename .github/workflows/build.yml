name: Build-Final-Tool
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 必須包含 opencv-python 確保圖片搜尋功能與檔案容量正確
          pip install pyinstaller pyautogui pillow opencv-python

      - name: Build executable
        # 這裡會將 01.png 和 ca2.png 兩張圖都封裝進去
        run: pyinstaller --onefile --noconsole --clean --add-data "01.png;." --add-data "ca2.png;." app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Full-Auto-Tool
          path: dist/app.exe
